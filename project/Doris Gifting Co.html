<!doctype html>

<head>

<title>Doris Gifting Co.</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500;1,600&family=Pinyon+Script&family=Playfair+Display:ital,wght@0,400;0,500;0,600;1,400;1,500;1,600&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>
  :root {
    --cream: #f3ede4;
    --cream-2: #ebe3d6;
    --bronze: #967259;
    --bronze-deep: #6f4f3a;
    --ink: #1a1410;
    --ink-soft: #4a423c;
    --ink-mute: #7a6f66;
    --line: #d9cfc1;
    --serif: 'Cormorant Garamond', 'Playfair Display', serif;
    --sans: 'Inter', system-ui, sans-serif;
  }

  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0;
    background: #d6cfc4;
    font-family: var(--sans);
    color: var(--ink);
    -webkit-font-smoothing: antialiased;
  }

  /* The "browser" frame surrounding the site simulation */
  .doris-stage {
    min-height: 100vh;
    display: grid;
    place-items: start center;
    padding: 24px;
  }
  .doris-frame {
    background: #fff;
    width: 100%;
    max-width: var(--frame-w, 1280px);
    box-shadow: 0 20px 80px rgba(0,0,0,0.18), 0 2px 8px rgba(0,0,0,0.08);
    border-radius: 8px;
    overflow: hidden;
    transition: max-width 280ms ease;
  }

  /* viewport-mode classes drive layout when explicitly overridden in Tweaks.
     In auto mode the frame is fluid (max-width = 100vw) so the design fills
     the actual device. */
  .vp-auto    { --frame-w: 100vw; }
  .vp-mobile  { --frame-w: 414px; }
  .vp-tablet  { --frame-w: 820px; }
  .vp-desktop { --frame-w: 1280px; }

  /* On real small windows, never let the simulation frame add padding around
     the content — the device IS the frame. */
  @media (max-width: 720px) {
    .doris-stage { padding: 0 !important; background: #fff; }
    .doris-frame { box-shadow: none; border-radius: 0; max-width: 100% !important; }
  }

  .serif { font-family: var(--serif); font-style: italic; font-weight: 500; }

  /* type defaults inside the site */
  .doris-frame p { line-height: 1.65; color: var(--ink-soft); }
  .doris-frame a { color: inherit; text-decoration: none; }
  .doris-frame button { font-family: inherit; cursor: pointer; }

  /* hide scrollbars on horizontal pill rows */
  .pillrow::-webkit-scrollbar { display: none; }
  .pillrow { scrollbar-width: none; }

  /* Lightbox keyframes */
  @keyframes doris-fade { from { opacity: 0; } to { opacity: 1; } }
  @keyframes doris-rise { from { opacity: 0; transform: scale(0.97); } to { opacity: 1; transform: scale(1); } }

  /* Smooth image fade-in */
  .doris-frame img { transition: opacity 360ms ease; }

  /* Hover lift on gallery cells */
  .gallery-cell {
    cursor: zoom-in;
    transition: transform 420ms cubic-bezier(.2,.7,.2,1), box-shadow 420ms ease;
  }
  .gallery-cell:hover {
    transform: translateY(-3px);
    box-shadow: 0 14px 40px rgba(0,0,0,0.12);
  }

  /* CTA / button hover */
  .doris-frame button {
    transition: transform 220ms ease, box-shadow 220ms ease, background 220ms ease, color 220ms ease;
  }
  .doris-frame button:hover { transform: translateY(-1px); }

  /* Reduce motion respect */
  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after { transition: none !important; animation: none !important; }
  }
</style>
</head>
<body>

<div id="root"></div>
