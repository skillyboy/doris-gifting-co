name: Rebuild docs for custom domain

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths-ignore:
      - 'docs/**'
      - 'CNAME'
      - '.github/workflows/rebuild-docs.yml'

jobs:
  rebuild:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build
      - name: Update docs with correct base
        run: |
          rm -rf docs
          cp -r dist docs
          touch docs/.nojekyll
          echo "www.dorisgiftingco.com" > docs/CNAME
      - name: Commit docs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/
          git diff --staged --quiet || git commit -m "chore: rebuild docs with base=/ for custom domain"
          git push
